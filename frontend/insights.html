<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASESS | Hospital Analytics</title>
    <meta name="description" content="View hospital analytics, condition distribution, and screening trends.">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages.css">
    <link rel="stylesheet" href="/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 20px; text-align: center; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-card .stat-icon { font-size: 1.6rem; margin-bottom: 8px; }
        .stat-card .stat-number { font-size: 1.8rem; font-weight: 700; font-family: 'Montserrat', sans-serif; }
        .stat-card .stat-label { font-size: 0.82rem; color: #64748b; margin-top: 4px; font-weight: 500; }
        .stat-blue .stat-number { color: #1565c0; }
        .stat-blue .stat-icon { color: #42a5f5; }
        .stat-teal .stat-number { color: #0d9488; }
        .stat-teal .stat-icon { color: #14b8a6; }
        .stat-green .stat-number { color: #15803d; }
        .stat-green .stat-icon { color: #22c55e; }
        .stat-cyan .stat-number { color: #0891b2; }
        .stat-cyan .stat-icon { color: #06b6d4; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media(max-width:768px) { .chart-grid { grid-template-columns: 1fr; } }
        .chart-panel { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 24px; border: 1px solid #e2e8f0; }
        .chart-panel h3 { font-size: 1rem; color: #1e293b; margin-bottom: 16px; font-weight: 600; }
        .screener-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .screener-row:last-child { border-bottom: none; }
        .screener-name { flex: 1; font-weight: 500; color: #334155; font-size: 0.9rem; }
        .screener-count { background: linear-gradient(135deg, #1565c0, #0d9488); color: #fff; padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .breakdown-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .breakdown-bar .bar-label { min-width: 100px; font-size: 0.85rem; font-weight: 500; color: #334155; }
        .breakdown-bar .bar-track { flex: 1; height: 10px; background: #e2e8f0; border-radius: 6px; overflow: hidden; }
        .breakdown-bar .bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
        .breakdown-bar .bar-value { min-width: 60px; text-align: right; font-size: 0.82rem; color: #64748b; font-weight: 500; }
    </style>
</head>
<body class="bg-insights">
    <div id="main-wrapper">
        <div id="header-placeholder"></div>

        <div class="container page-container">
            <div class="analytics-header">
                <h2 style="color: #ffffff;"><i class="ri-bar-chart-grouped-line" style="margin-right:8px;"></i>Hospital Analytics</h2>
                <p style="color:rgba(255,255,255,0.7); margin-top:4px;">Real-time data from AI screening results</p>
            </div>

            <!-- Stat Cards -->
            <div class="analytics-grid" id="statCards">
                <div class="stat-card stat-blue">
                    <div class="stat-icon"><i class="ri-scan-line"></i></div>
                    <div class="stat-number" id="statTotalScans"><i class="ri-loader-4-line ri-spin" style="font-size:1.2rem;"></i></div>
                    <div class="stat-label">Total Scans</div>
                </div>
                <div class="stat-card stat-teal">
                    <div class="stat-icon"><i class="ri-alert-line"></i></div>
                    <div class="stat-number" id="statAbnormal">—</div>
                    <div class="stat-label">Abnormal Rate</div>
                </div>
                <div class="stat-card stat-green">
                    <div class="stat-icon"><i class="ri-shield-check-line"></i></div>
                    <div class="stat-number" id="statNormal">—</div>
                    <div class="stat-label">Normal Rate</div>
                </div>
                <div class="stat-card stat-cyan">
                    <div class="stat-icon"><i class="ri-focus-3-line"></i></div>
                    <div class="stat-number" id="statAvgConf">—</div>
                    <div class="stat-label">Avg Confidence</div>
                </div>
                <div class="stat-card stat-blue">
                    <div class="stat-icon"><i class="ri-checkbox-circle-line"></i></div>
                    <div class="stat-number" id="statVerified">—</div>
                    <div class="stat-label">Verified</div>
                </div>
                <div class="stat-card stat-teal">
                    <div class="stat-icon"><i class="ri-time-line"></i></div>
                    <div class="stat-number" id="statPending">—</div>
                    <div class="stat-label">Pending Review</div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="chart-grid">
                <div class="chart-panel">
                    <h3><i class="ri-pie-chart-line" style="margin-right:6px; color:#1565c0;"></i>Condition Distribution</h3>
                    <div style="max-height:280px; display:flex; justify-content:center;">
                        <canvas id="conditionChart"></canvas>
                    </div>
                    <p id="conditionNoData" style="display:none; text-align:center; color:#64748b; padding:20px;">No scan data available yet.</p>
                </div>
                <div class="chart-panel">
                    <h3><i class="ri-line-chart-line" style="margin-right:6px; color:#0d9488;"></i>Screening Trends (Last 7 Days)</h3>
                    <div style="max-height:280px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                    <p id="trendNoData" style="display:none; text-align:center; color:#64748b; padding:20px;">No scan data available yet.</p>
                </div>
            </div>

            <!-- Condition Breakdown + Top Screeners -->
            <div class="chart-grid">
                <div class="chart-panel" id="conditionBreakdown" style="display:none;">
                    <h3><i class="ri-bar-chart-horizontal-line" style="margin-right:6px; color:#1565c0;"></i>Condition Breakdown</h3>
                    <div id="conditionBarsContainer"></div>
                </div>
                <div class="chart-panel" id="screenersPanel" style="display:none;">
                    <h3><i class="ri-user-star-line" style="margin-right:6px; color:#0d9488;"></i>Top Screeners</h3>
                    <div id="screenersContainer"></div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/script.js"></script>
    <script>
        let condChart = null;
        let trendChartObj = null;

        // Cohesive blue-green palette
        const PALETTE = ['#1565c0', '#0d9488', '#1e88e5', '#14b8a6', '#42a5f5', '#2dd4bf', '#64b5f6', '#5eead4'];

        async function loadAnalytics() {
            try {
                const response = await fetch('/ai/analytics');
                if (!response.ok) throw new Error('Failed to fetch analytics');
                const data = await response.json();

                // Stat cards
                document.getElementById('statTotalScans').textContent = data.total_scans.toLocaleString();
                document.getElementById('statAbnormal').textContent = data.abnormal_percentage + '%';
                document.getElementById('statNormal').textContent = (data.normal_percentage || 0) + '%';
                document.getElementById('statAvgConf').textContent = (data.avg_confidence || 0) + '%';
                document.getElementById('statVerified').textContent = (data.verified_count || 0).toLocaleString();
                document.getElementById('statPending').textContent = (data.pending_count || 0).toLocaleString();

                // Condition Distribution Chart
                const condLabels = Object.keys(data.condition_distribution);
                const condValues = Object.values(data.condition_distribution);

                if (condLabels.length > 0) {
                    const condColors = condLabels.map((_, i) => PALETTE[i % PALETTE.length]);
                    if (condChart) condChart.destroy();
                    condChart = new Chart(document.getElementById('conditionChart'), {
                        type: 'doughnut',
                        data: {
                            labels: condLabels,
                            datasets: [{
                                data: condValues,
                                backgroundColor: condColors,
                                borderWidth: 2,
                                borderColor: '#ffffff',
                            }]
                        },
                        options: {
                            responsive: true,
                            cutout: '55%',
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: { boxWidth: 12, padding: 14, font: { size: 11, family: 'Montserrat' }, color: '#475569' }
                                }
                            }
                        }
                    });

                    // Condition breakdown bars
                    const total = condValues.reduce((a,b) => a+b, 0);
                    const barsDiv = document.getElementById('conditionBarsContainer');
                    barsDiv.innerHTML = '';
                    condLabels.forEach((cls, i) => {
                        const pct = total > 0 ? ((condValues[i] / total) * 100).toFixed(1) : 0;
                        const color = PALETTE[i % PALETTE.length];
                        barsDiv.innerHTML += `
                            <div class="breakdown-bar">
                                <span class="bar-label">${cls}</span>
                                <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>
                                <span class="bar-value">${condValues[i]} (${pct}%)</span>
                            </div>`;
                    });
                    document.getElementById('conditionBreakdown').style.display = 'block';
                } else {
                    document.getElementById('conditionChart').style.display = 'none';
                    document.getElementById('conditionNoData').style.display = 'block';
                }

                // Screening Trends Chart
                const trendLabels = Object.keys(data.daily_scans);
                const trendValues = Object.values(data.daily_scans);

                if (trendLabels.length > 0) {
                    if (trendChartObj) trendChartObj.destroy();
                    trendChartObj = new Chart(document.getElementById('trendChart'), {
                        type: 'line',
                        data: {
                            labels: trendLabels,
                            datasets: [{
                                label: 'Daily Scans',
                                data: trendValues,
                                borderColor: '#0d9488',
                                backgroundColor: 'rgba(13, 148, 136, 0.08)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 5,
                                pointBackgroundColor: '#0d9488',
                                borderWidth: 2,
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: { color: 'rgba(226,232,240,0.6)' },
                                    ticks: { color: '#64748b', font: { family: 'Montserrat' }, stepSize: 1 }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#64748b', font: { family: 'Montserrat' } }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: { font: { size: 12, family: 'Montserrat' }, color: '#475569' }
                                }
                            }
                        }
                    });
                } else {
                    document.getElementById('trendChart').style.display = 'none';
                    document.getElementById('trendNoData').style.display = 'block';
                }

                // Top Screeners
                if (data.top_screeners && Object.keys(data.top_screeners).length > 0) {
                    const container = document.getElementById('screenersContainer');
                    container.innerHTML = '';
                    Object.entries(data.top_screeners).forEach(([name, count]) => {
                        container.innerHTML += `
                            <div class="screener-row">
                                <i class="ri-user-line" style="color:#1565c0; font-size:1.1rem;"></i>
                                <span class="screener-name">${name}</span>
                                <span class="screener-count">${count} scans</span>
                            </div>`;
                    });
                    document.getElementById('screenersPanel').style.display = 'block';
                }

            } catch(err) {
                document.getElementById('statTotalScans').textContent = '—';
                document.getElementById('statAbnormal').textContent = '—';
                document.getElementById('conditionChart').style.display = 'none';
                document.getElementById('conditionNoData').style.display = 'block';
                document.getElementById('conditionNoData').textContent = '⚠️ Could not load analytics. ' + err.message;
                document.getElementById('trendChart').style.display = 'none';
                document.getElementById('trendNoData').style.display = 'block';
                document.getElementById('trendNoData').textContent = '⚠️ Could not load trends.';
            }
        }

        loadAnalytics();
    </script>
</body>
</html>
